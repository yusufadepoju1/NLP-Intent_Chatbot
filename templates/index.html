<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | NLP Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .chat-container { height: calc(100vh - 160px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div class="max-w-2xl mx-auto h-screen flex flex-col p-4">
        <header class="bg-white p-4 rounded-t-2xl shadow-sm border-b flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center text-white">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <h1 class="font-bold text-slate-800">NLP Assistant</h1>
                    <p class="text-xs text-green-500 flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online
                    </p>
                </div>
            </div>
        </header>

        <div id="chatbox" class="chat-container flex-1 bg-white p-6 overflow-y-auto flex flex-col gap-4">
            <div class="flex flex-col items-start">
                <div class="bg-slate-100 text-slate-700 p-3 rounded-2xl rounded-bl-none max-w-[80%] shadow-sm">
                    Hello! I am your AI assistant. How can I help you today?
                </div>
            </div>
        </div>

        <footer class="bg-white p-4 rounded-b-2xl shadow-inner border-t">
            <form id="chat-form" class="flex gap-2">
                <input type="text" id="user-input" autocomplete="off" 
                       placeholder="Type your message..." 
                       class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl transition-all flex items-center gap-2">
                    <span class="hidden sm:inline">Send</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </footer>
    </div>

    <script>
        const chatbox = document.getElementById('chatbox');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');

        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = isUser ? "flex flex-col items-end" : "flex flex-col items-start";
            
            const content = `
                <div class="${isUser ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'} p-3 rounded-2xl ${isUser ? 'rounded-br-none' : 'rounded-bl-none'} max-w-[80%] shadow-sm">
                    ${text}
                </div>
            `;
            
            div.innerHTML = content;
            chatbox.appendChild(div);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = input.value.trim();
            if (!message) return;

            // User message
            appendMessage(message, true);
            input.value = '';

            try {
                const response = await fetch('/get', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                // Bot response
                setTimeout(() => {
                    appendMessage(data.response, false);
                }, 500);
            } catch (error) {
                appendMessage("Error: Could not reach the server.", false);
            }
        });
    </script>
</body>
</html>
